services:
  narrowcti-gateway:
    build:
      context: ..
      dockerfile: Dockerfile.gateway
    image: ${NARROWCTI_GATEWAY_IMAGE:-narrowcti/gateway:local}
    container_name: ${NARROWCTI_GATEWAY_CONTAINER:-narrowcti-gateway}
    env_file:
      - ${NARROWCTI_GATEWAY_ENV_FILE:-./gateway.env.example}
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    command: ["python", "-m", "gateway.connector"]
    restart: ${NARROWCTI_GATEWAY_RESTART:-no}
    volumes:
      - narrowcti-state:/app/state
      - narrowcti-licenses:/licenses:ro
    networks:
      - opencti

  narrowcti-preflight:
    build:
      context: ..
      dockerfile: Dockerfile.gateway
    image: ${NARROWCTI_GATEWAY_IMAGE:-narrowcti/gateway:local}
    env_file:
      - ${NARROWCTI_GATEWAY_ENV_FILE:-./gateway.env.example}
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    command: ["python", "-m", "gateway.preflight"]
    restart: "no"
    profiles:
      - ops
    volumes:
      - narrowcti-state:/app/state
      - narrowcti-licenses:/licenses:ro
    networks:
      - opencti

  narrowcti-curation-report:
    build:
      context: ..
      dockerfile: Dockerfile.gateway
    image: ${NARROWCTI_GATEWAY_IMAGE:-narrowcti/gateway:local}
    env_file:
      - ${NARROWCTI_GATEWAY_ENV_FILE:-./gateway.env.example}
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    command:
      - python
      - -m
      - gateway.curation_report
      - --html-file
      - /app/state/curation-report.html
    restart: "no"
    profiles:
      - ops
    volumes:
      - narrowcti-state:/app/state
      - narrowcti-licenses:/licenses:ro
    networks:
      - opencti

  narrowcti-operational-validation:
    build:
      context: ..
      dockerfile: Dockerfile.gateway
    image: ${NARROWCTI_GATEWAY_IMAGE:-narrowcti/gateway:local}
    env_file:
      - ${NARROWCTI_GATEWAY_ENV_FILE:-./gateway.env.example}
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    command:
      - python
      - -m
      - gateway.operational_validation
      - --decision-path
      - /app/state/audit
      - --required-sources
      - ${NARROWCTI_OPERATIONAL_VALIDATION_SOURCES:-otx,misp}
      - --evidence-file
      - ${NARROWCTI_OPERATIONAL_VALIDATION_EVIDENCE_FILE:-/app/state/operational-validation-evidence.json}
      - --format
      - html
      - --output-file
      - /app/state/operational-validation.html
    restart: "no"
    profiles:
      - ops
    volumes:
      - narrowcti-state:/app/state
      - narrowcti-licenses:/licenses:ro
    networks:
      - opencti

  narrowcti-support-diagnostics:
    build:
      context: ..
      dockerfile: Dockerfile.gateway
    image: ${NARROWCTI_GATEWAY_IMAGE:-narrowcti/gateway:local}
    env_file:
      - ${NARROWCTI_GATEWAY_ENV_FILE:-./gateway.env.example}
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    command:
      - python
      - -m
      - gateway.diagnostics
      - --redaction-profile
      - support
      - --html-file
      - /app/state/support-diagnostics.html
      - --bundle-file
      - /app/state/support-diagnostics.zip
    restart: "no"
    profiles:
      - ops
    volumes:
      - narrowcti-state:/app/state
      - narrowcti-licenses:/licenses:ro
    networks:
      - opencti

networks:
  opencti:
    external: true
    name: ${NARROWCTI_DOCKER_NETWORK:-opencti_default}

volumes:
  narrowcti-state:
  narrowcti-licenses:
