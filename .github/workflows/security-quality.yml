name: Security and Quality

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-security-quality:
    name: Python quality, SAST and dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            connectors/otx/requirements.txt
            requirements-dev.txt

      - name: Install security and quality tools
        run: python -m pip install --requirement requirements-dev.txt

      - name: Run Ruff
        run: ruff check connectors core exporters gateway tests

      - name: Run Bandit
        run: bandit --quiet --recursive --severity-level medium connectors core exporters gateway

      - name: Audit Python dependencies
        run: |
          pip-audit --strict --requirement connectors/otx/requirements.txt
          pip-audit --strict --requirement requirements-dev.txt
