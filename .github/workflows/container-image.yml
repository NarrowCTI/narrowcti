name: Container Image

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/narrowcti/narrowcti-gateway

jobs:
  publish:
    name: Build, scan and publish gateway image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=NarrowCTI Gateway
            org.opencontainers.image.description=OpenCTI-native CTI curation gateway
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build exact candidate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.gateway
          load: true
          push: false
          tags: |
            narrowcti-gateway:scan
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test candidate image
        run: >-
          docker run --rm narrowcti-gateway:scan
          python -c "import gateway.connector, gateway.preflight, exporters.stix_builder"

      - name: Scan candidate image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: narrowcti-gateway:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Generate candidate image SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: narrowcti-gateway:scan
          format: cyclonedx-json
          artifact-name: narrowcti-gateway-${{ github.sha }}.cdx.json

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish scanned image tags
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: docker push --all-tags ${{ env.IMAGE_NAME }}
